<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TILT | Kid Location Alerts</title>
  <link rel="icon" href="assets/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-i18n-title="meta.siteTitle">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html" data-localized-link>
        <img src="assets/icon.png" alt="TILT icon">
        <span>TILT</span>
      </a>
      <div class="nav-row">
        <a class="nav-link active" href="index.html" data-localized-link data-i18n="nav.home"></a>
        <a class="nav-link" href="premium.html" data-localized-link data-i18n="nav.premium"></a>
        <a class="nav-link" href="privacy.html" data-localized-link data-i18n="nav.privacy"></a>
        <a class="nav-link" href="terms.html" data-localized-link data-i18n="nav.terms"></a>
        <select id="lang-switcher" class="lang" aria-label="Language"></select>
      </div>
    </div>
  </header>

  <main>
    <section class="home-page-shell">
      <div class="container home-shell">
        <section id="download" class="home-hero">
        <div class="hero-copy">
          <h1>
            <span data-i18n="home.heroLeadPrimary"></span>
            <span data-i18n="home.heroLeadSecondary"></span>
          </h1>
          <div class="hero-rule" aria-hidden="true"></div>
          <p data-i18n="home.messageBody"></p>
          <p class="hero-emphasis" data-i18n="home.heroEmphasis"></p>
        </div>
        <div class="hero-device">
          <div class="hero-phone hero-phone--framed" aria-hidden="true">
            <div class="phone-frame">
              <div class="phone-notch"></div>
              <div class="phone-screen">
                <div class="status-row">9:41</div>
                <div class="avatar"></div>
                <div class="checkmark">✓</div>
                <strong data-i18n="home.arrivalName"></strong>
                <p data-i18n="home.arrivalSentence"></p>
                <span data-i18n="home.arrivalStatus"></span>
                <div class="phone-mountains"></div>
                <div class="phone-pin"></div>
              </div>
            </div>
          </div>
          <div class="store-badges hero-badges">
            <a class="cta cta-badge" href="https://apps.apple.com/app/id6759187461" target="_blank" rel="noopener noreferrer">
              <img
                id="appstore-badge"
                data-appstore-badge
                src="assets/badges/appstore-en.svg"
                alt="Download on the App Store"
                data-i18n-alt="home.ctaAlt"
              >
            </a>
            <a
              class="playstore-badge"
              href="https://play.google.com/store/apps/details?id=org.nineh41.android.wmka"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Get it on Google Play"
              data-i18n-aria-label="home.playCtaAlt"
            >
              <span class="playstore-mark" aria-hidden="true"></span>
              <span class="playstore-copy">
                <span data-i18n="home.playCtaSmall"></span>
                <strong data-i18n="home.playCtaMain"></strong>
              </span>
            </a>
          </div>
        </div>
        </section>

        <section id="why" class="home-compare">
        <h2 data-i18n="home.compareTitle"></h2>
        <table class="compare-table">
          <thead>
            <tr>
              <th data-i18n="home.compareBenefits"></th>
              <th>TILT</th>
              <th data-i18n="home.compareOther"></th>
            </tr>
          </thead>
          <tbody>
            <tr><td data-i18n="home.compareCrossPlatform"></td><td class="yes">✓</td><td class="no">×</td></tr>
            <tr><td data-i18n="home.compareNoTracking"></td><td class="yes">✓</td><td class="no">×</td></tr>
            <tr><td data-i18n="home.comparePlaces"></td><td class="yes">✓</td><td class="no">×</td></tr>
            <tr><td data-i18n="home.compareAutonomy"></td><td class="yes">✓</td><td class="no">×</td></tr>
          </tbody>
        </table>
        </section>

        <section id="features" class="home-pillars">
          <article>
            <span class="feature-icon shield-icon" aria-hidden="true"></span>
            <h3 data-i18n="home.pillarPrivacy"></h3>
            <p data-i18n="home.pillarPrivacyBody"></p>
          </article>
          <article>
            <span class="feature-icon family-icon" aria-hidden="true"></span>
            <h3 data-i18n="home.pillarFamily"></h3>
            <p data-i18n="home.pillarFamilyBody"></p>
          </article>
          <article>
            <span class="feature-icon compass-icon" aria-hidden="true"></span>
            <h3 data-i18n="home.pillarAutonomy"></h3>
            <p data-i18n="home.pillarAutonomyBody"></p>
          </article>
        </section>
        <div class="home-landscape" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div data-i18n="footer.tag"></div>
      <div class="footer-links">
        <a href="premium.html" data-localized-link data-i18n="nav.premium"></a>
        <a href="privacy.html" data-localized-link data-i18n="nav.privacy"></a>
        <a href="terms.html" data-localized-link data-i18n="nav.terms"></a>
        <a href="https://9h41.org" target="_blank" rel="noopener noreferrer">9h41.org</a>
        <a href="mailto:contact@9h41.org" data-i18n="legal.contact"></a>
        <a href="#cookie-settings" data-consent-settings data-i18n="consent.settings"></a>
      </div>
      <div class="meta" data-i18n="footer.copy"></div>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="site.js"></script>
</body>
</html>
