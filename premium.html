<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TILT | Premium Plans</title>
  <link rel="icon" href="assets/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-i18n-title="premium.metaTitle">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html" data-localized-link>
        <img src="assets/icon.png" alt="TILT icon">
        <span>TILT</span>
      </a>
      <div class="nav-row">
        <a class="nav-link" href="index.html" data-localized-link data-i18n="nav.home"></a>
        <a class="nav-link active" href="premium.html" data-localized-link data-i18n="nav.premium"></a>
        <a class="nav-link" href="privacy.html" data-localized-link data-i18n="nav.privacy"></a>
        <a class="nav-link" href="terms.html" data-localized-link data-i18n="nav.terms"></a>
        <select id="lang-switcher" class="lang" aria-label="Language"></select>
      </div>
    </div>
  </header>

  <main class="premium-page">
    <section class="premium-plans">
      <div class="container premium-scene">
        <div class="premium-copy">
          <h1 data-i18n="premium.heroTitle"></h1>
          <p data-i18n="premium.heroSubtitle"></p>
        </div>

        <div class="plans-stage">
          <article class="price-panel price-panel--monthly">
            <h2 data-i18n="premium.plan.monthly.title"></h2>
            <p class="plan-kicker" data-i18n="premium.plan.monthly.kicker"></p>
            <p class="price-line"><strong data-i18n="premium.plan.monthly.amount"></strong><span>€</span></p>
            <p class="price-note" data-i18n="premium.plan.monthly.note"></p>
            <ul class="plan-list">
              <li data-i18n="premium.feature.children"></li>
              <li data-i18n="premium.feature.places"></li>
              <li data-i18n="premium.feature.notifications"></li>
              <li data-i18n="premium.plan.monthly.noCommitment"></li>
            </ul>
          </article>

          <article class="price-panel price-panel--yearly price-panel--featured">
            <div class="chosen-badge" data-i18n="premium.plan.annual.badge"></div>
            <h2 data-i18n="premium.plan.annual.title"></h2>
            <p class="plan-kicker" data-i18n="premium.plan.annual.kicker"></p>
            <p class="price-line"><strong data-i18n="premium.plan.annual.amount"></strong><span>€</span></p>
            <p class="price-note" data-i18n="premium.plan.annual.note"></p>
            <ul class="plan-list">
              <li data-i18n="premium.feature.children"></li>
              <li data-i18n="premium.feature.places"></li>
              <li data-i18n="premium.feature.notifications"></li>
            </ul>
          </article>

          <article class="price-panel price-panel--lifetime">
            <h2 data-i18n="premium.plan.lifetime.title"></h2>
            <p class="plan-kicker" data-i18n="premium.plan.lifetime.kicker"></p>
            <p class="price-line"><strong data-i18n="premium.plan.lifetime.amount"></strong><span>€</span></p>
            <p class="price-note" data-i18n="premium.plan.lifetime.note"></p>
            <ul class="plan-list">
              <li data-i18n="premium.feature.children"></li>
              <li data-i18n="premium.feature.places"></li>
              <li data-i18n="premium.feature.notifications"></li>
            </ul>
          </article>
        </div>

        <div class="privacy-row">
          <span data-i18n="premium.noGps"></span>
          <span data-i18n="premium.noTracking"></span>
          <span data-i18n="premium.noSurveillance"></span>
        </div>

        <div class="premium-mountains premium-mountains-back" aria-hidden="true"></div>
        <div class="premium-mountains premium-mountains-mid" aria-hidden="true"></div>
        <div class="premium-mountains premium-mountains-front" aria-hidden="true"></div>
      </div>
    </section>

    <section class="container premium-note">
      <article class="card">
        <h2 data-i18n="premium.featuresTitle"></h2>
        <p data-i18n="premium.unlock"></p>
        <p class="meta" data-i18n="premium.disclaimer"></p>
      </article>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div data-i18n="footer.tag"></div>
      <div class="footer-links">
        <a href="index.html" data-localized-link data-i18n="nav.home"></a>
        <a href="premium.html" data-localized-link data-i18n="nav.premium"></a>
        <a href="privacy.html" data-localized-link data-i18n="nav.privacy"></a>
        <a href="terms.html" data-localized-link data-i18n="nav.terms"></a>
        <a href="https://9h41.org" target="_blank" rel="noopener noreferrer">9h41.org</a>
        <a href="mailto:contact@9h41.org" data-i18n="legal.contact"></a>
      </div>
      <div class="meta" data-i18n="footer.copy"></div>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="site.js"></script>
</body>
</html>
